front:
  text: 中天紫微星真寶懴隸九伏以乾坤大德廣覆載於羣生日月光明普照臨於萬彚凡伸懇禱仰冀鍳觀臣謹運真香䖍誠奏啓供養虛皇大道三境至尊中天星主北極紫微大帝斗父龍漢祖劫周御國王天尊斗毋摩利支天大聖高上玉皇尊帝星君北極玄卿大帝日宫太陽帝君月府太隂皇君五方五德星君四氣四曜星君天罡大聖星君三台華蓋星君二十八宿星君十二宫辰星君當生本命星君上清福祿夀三老星君流年運限照臨星君三垣內外星君周天列曜河漢星君三界十方千真萬聖恭望洪慈鍳今懴悔臣聞太極生兩儀而垂象默運化鈞髙穹布列宿以昭明分輝大地周天三百六十五四分之餘度微數萬一千五百二十之𨼆名見遲流伏逆於星𨇠循經緯周旋於分野恭惟星主紫微大帝玉陛森嚴瑶天高邈權與迼化掌握樞機端居總理于三天統治運行于九道七政四氣施正令于春夏秋冬五斗衆星鎮方維于乾坤𩀌坎本命元辰朗曜福祿夀老光明罡星環指于太空宿曜照臨于大地不言善應有感必通天無𥝠親常親輔于有德人所禀命蓋命屬于上穹臣等皈依恭修寶懴望皇靈而稽首仰斗極以傾心以今奉為某自從無始乃至有生縱一念以𡨋行六根纒結恣三業而罔覺十惡積增若不懴陳曷叨恩宥是以列欵上陳皈命朝禮仰望紫微至聖璇璣列真介景福以均霑降慈光而普照蕩除三業清淨六根俾五福以茂隆冀千祥而駢集臣等瞻天望聖激切屏營之至志心朝禮人各恭敬
