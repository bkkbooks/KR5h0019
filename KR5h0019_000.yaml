body:
  text: 志心朝禮高上玉皇尊星大帝紫微中宫星主北極大帝紫微上宫南極天皇上帝斗父龍漢祖劫周御國王天尊斗毋紫光金尊聖德巨光天后日宫炎光太陽帝君月府素曜太隂皇君東方木德嵗星星君南方火德熒𤏘星君西方金德太白星君北方水德伺晨星君中央土德鎮星星君交杴神首羅睺星君交中神尾計都星君天乙華陽紫氣星君太乙華隂月孛星君北斗天樞陽明貪狼星君北斗天璇隂精巨門星君北斗天機真人祿存星君北斗天權玄𡨋文曲星君北斗天衡丹元亷貞星君北斗闓陽北極武曲星君北斗瑶光天闋破軍星君北斗洞明左輔星君北斗𨼆光右弼星君南斗天府司命星君南斗天相司録星君南斗天梁延夀星君南斗天同益算星君南斗天樞度厄星君南斗天機上生星君東斗蒼靈延生星君東斗陵光護命星君東斗開天大衛集福星君東斗大明和陽保和星君東斗尾極總監星君西斗白標星君西斗高元星君西斗皇靈星君西斗巨威星君中斗赫靈度世星君中斗幹化上聖星君中斗冲和至德星君天罡節度紫庭星君上台虛精開德星君中台祿淳司空星君下台曲生司祿星君角宿天門星君亢宿天庭星君氐宿天府星君房宿天駟星君心宿天王星君尾宿天雞星君箕宿天津星君斗宿天廟星君牛宿天機星君女宿天女星君虛宿天卿星君危宿天錢星君室宿天廪星君壁宿天巿星君奎宿天將星君婁宿天獄星君胃宿天倉星君昴宿天目星君畢宿天耳星君觜宿天屏星君參宿天水星君井宿天井星君鬼宿天匱星君柳宿天廚星君星宿天庫星君張宿天稱星君翼宿天都星君軫宿天階星君天稱宫辰星君天蝎宫辰星君人馬宫辰星君磨蝎宫辰星君寶瓶宫辰星君𩀱魚宫辰星君白羊宫辰星君金牛宫辰星君隂陽宫辰星君巨蟹宫辰星君獅子宫辰星君𩀱女宫辰星君當生本命元辰星君福星天德星君祿星天佑星君夀星老人星君流年運限照臨星君紫微垣內列曜星君太微垣內列矅星君天巿垣內列曜星君六十甲子江淮河漢星君禮足各長跪皈命懴悔臣法衆等志心皈身皈神皈命玄穹上聖列宿星君本命元辰照臨真宰恭望大慈洞埀巨澤普降洪恩臣聞煌煌列聖朝拱北極之尊燦燦七星默運中天之化有求必應無禱不從以今懴悔某自從無始以至有生𢦙身口意之相違廣營三業𢦙貪嗔癡之未所放縱六情殺盜邪淫言妄語𢦙裸露三光之下𢦙觸突衆聖之前損害衆生拋擲五榖十𢙣障重三毒業深任性所為不知慚愧𢦙見聞而自作𢦙想念以教他種種罪根一一懴悔伏願星真洞鍳斗極垂慈元綱流汗漫之恩法雨沛汪洋之澤矜憐愚昧原宥愆尤斡運限以和平順星辰于躔度承斯懴力仰荷玄功嘉與群生咸歸正道志一心稽首禮謝無上至真三寶伏聞彼蒼者天運一元而彰衆矅至玄者道鍚五福以惠群生臣等向來拜禮寶懴巳在云周伏願諸天洞鍳廣施普博之恩列矅高臨大賜慈悲之澤千愆萬過咸乞蕩除三業六根悉蒙原赦福資萬有恩被十方稽首皈依無極天道志心稱念消愆滅罪天尊中天紫微星真寶懴
