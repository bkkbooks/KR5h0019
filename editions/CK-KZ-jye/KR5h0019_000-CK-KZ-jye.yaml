body:
  text: 志心朝禮高上玉皇尊星大帝紫微中宮星主北極大帝紫微上宮南極天皇上帝斗父龍漢祖刼周御國王天尊斗母紫光金尊聖德巨光天后日宮炎光太陽帝君月府素曜太陰皇君東方木德嵗星星君南方火德熒𤏘星君西方金德太白星君北方水德伺晨星君中央土德鎭星星君交初神首羅㬋星君交中神尾計都星君天乙華陽紫炁星君太乙華陰月孛星君北斗天樞陽明貪狼星君北斗天璇陰精巨門星君北斗天機眞人祿存星君北斗天權玄冥文曲星君北斗天衡丹元廉貞星君北斗闓陽北極武曲星君北斗瑶光天關破軍星君北斗洞明左輔星君北斗隱光右弼星君南斗天府司命星君南斗天相司錄星君南斗天梁延夀星君南斗天同益算星君南斗天樞度厄星君南斗天機上生星君東斗蒼靈延生星君東斗陵光護命星君東斗開天大衞集福星君東斗大明和陽保和星君東斗尾極總監星君西斗白標星君西斗高元星君西斗皇靈星君西斗巨威星君中斗赫靈度世星君中斗斡化上聖星君中斗冲和至德星君天罡節度紫庭星君上臺虛精開德星君中臺祿淳司空星君下臺曲生司祿星君角宿天門星君亢宿天庭星君氐宿天府星君房宿天駟星君心宿天王星君尾宿天雞星君箕宿天津星君斗宿天廟星君牛宿天機星君女宿天女星君虛宿天卿星君危宿天錢星君室宿天廩星君壁宿天市星君奎宿天將星君婁宿天獄星君胃宿天倉星君昴宿天目星君畢宿天耳星君觜宿天屏星君參宿天水星君井宿天井星君鬼宿天匱星君柳宿天𢊍星君星宿天庫星君張宿天秤星君翼宿天都星君軫宿天階星君天秤宮辰星君天蝎宮辰星君人馬宮辰星君磨蝎宮辰星君寶瓶宮辰星君雙魚宮辰星君白羊宮辰星君金牛宮辰星君陰陽宮辰星君巨蟹宮辰星君獅子宮辰星君雙女宮辰星君當生本命元辰星君福星天德星君祿星天佑星君夀星老人星君流年運限照臨星君紫微垣內列曜星君太微垣內列曜星君天市垣內列曜星君六十甲子江淮河漢星君禮足各長跪皈命懴悔臣法眾等志心皈身皈神皈命玄穹上聖列宿星君本命元辰照臨眞宰恭望大慈洞垂巨澤普降洪恩臣聞煌煌列聖朝拱北極之尊燦燦七星默運中天之化有求必應無禱不從以今懴悔某自從無始以至有生或身口意之相違廣營三業或貪嗔癡之未斷放縱六情殺盜邪淫綺言妄語或躶露三光之下或觸突眾聖之前損害眾生抛擲五穀十惡障重三毒業深任性所爲不知慚愧或見聞而自作或想念以教他種種罪根一一懴悔伏願星眞洞鑒斗極垂慈元綱流汗漫之恩法雨沛汪洋之澤矜憐愚昧原宥愆尤斡運限以和平順星辰於躔度承斯懴力仰荷玄功嘉與羣生咸歸正道志一心稽首禮謝無上至眞三寶伏聞彼蒼者天運一元而彰眾曜至玄者道錫五福以惠羣生臣等向來拜禮寶懴已在云周伏願諸天洞鑒廣施普博之恩列曜高臨大賜慈悲之澤千愆萬過咸乞蕩除三業六根悉蒙原赦福資萬有恩被十方稽首皈依無極天道志心稱念消愆滅罪天尊
