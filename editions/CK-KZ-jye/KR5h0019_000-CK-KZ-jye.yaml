front:
  text: 伏以乾坤大德廣覆載於羣生日月光明普照臨於萬彙凡伸懇禱仰冀鑒觀臣謹運眞香䖍誠奏啟供養虛皇大道三境至尊中天星主北極紫微大帝斗父龍漢祖劫周御國王天尊斗母摩利支天大聖高上玉皇尊帝星君北極玄卿大帝日宮太陽帝君月府太陰皇君五方五德星君四炁四耀星君天罡大聖星君三台華葢星君二十八宿星君十二宮辰星君當生本命星君上清福祿夀三老星君流年運限照臨星君三垣內外星君周天列曜河漢星君三界十方千眞萬聖恭望洪慈鑒今懴悔臣聞太極生兩儀而垂象默運化鈞高穹布列宿以昭明分輝大地周天三百六十五四分之餘度微數萬一千五百二十之隱名見遲流伏逆於星躔循經緯周旋於分野恭惟星主紫微大帝玉陛森嚴瑶天高邈權輿造化掌握樞機端居總理於三天統治運行於九道七政四炁施正令於春夏秋冬五斗眾星鎭方維於乾坤離坎本命元辰朗曜福祿夀老光明罡星環指於太空宿曜照臨於大地不言善應有感必通天無私親常親輔於有德人所稟命葢命屬於上穹臣等皈依恭修寶懴望皇靈而稽首仰斗極以傾心以今奉爲某自從無始乃至有生縱一念以冥行六根纒結恣三業而罔覺十惡積增若不懴陳曷叨恩宥是以列款上陳皈命朝禮仰望紫微至聖璇璣列眞介景福以均霑降慈光而普照蕩除三業清淨六根俾五福以茂隆冀千祥而駢集臣等瞻天望聖激切屏營之至志心朝禮人各恭敬
