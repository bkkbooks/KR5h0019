body:
  text: 志心朝禮高上玉皇尊星大帝紫㣲中宫星主北極大帝紫㣲上宫南極天皇上帝斗父龍漢祖刼周御國王天尊斗毋紫光金尊聖德巨光天后日宫炎光太陽帝君月府素曜太隂皇君東方木徳嵗星星君南方火徳熒𤏘星君西方金徳太白星君北方水徳伺晨星君中央土徳鎮星星君交杴神首羅睺星君交中神尾計都星君天乙華陽紫炁星君太乙華隂月孛星君北斗天樞陽明貪狼星君北斗天璇隂精巨門星君北斗天機真人禄存星君北斗天權玄𡨋文曲星君北斗天衡丹元亷貞星君北斗闓陽北極武曲星君北斗瑶光天闋破軍星君北斗洞明左輔星君北斗𨼆光右弼星君南斗天府司命星君南斗天相司錄星君南斗天梁延夀星君南斗天同益算星君南斗天樞度厄星君南斗天機上生星君東斗蒼靈延生星君東斗陵光護命星君東斗開天大衛集福星君東斗大明和陽保和星君東斗尾極總監星君西斗白標星君西斗高元星君西斗皇靈星君西斗巨威星君中斗赫靈度世星君中斗幹化上聖星君中斗冲和至徳星君天罡節度紫庭星君上台虚精開徳星君中台禄淳司空星君下台曲生司禄星君角宿天門星君亢宿天庭星君氐宿天府星君房宿天駟星君心宿天王星君尾宿天雞星君箕宿天津星君斗宿天廟星君牛宿天機星君女宿天女星君虚宿天卿星君危宿天錢星君室宿天廪星君壁宿天巿星君奎宿天將星君婁宿天獄星君胃宿天倉星君昴宿天目星君畢宿天耳星君觜宿天屏星君參宿天水星君井宿天井星君鬼宿天匱星君柳宿天𢊍星君星宿天庫星君張宿天秤星君翼宿天都星君軫宿天階星君天秤宫辰星君天蝎宫辰星君人馬宫辰星君磨蝎宫辰星君寳瓶宫辰星君𩀱魚宫辰星君白羊宫辰星君金牛宫辰星君隂陽宫辰星君巨蟹宫辰星君獅子宫辰星君𩀱女宫辰星君當生本命元辰星君福星天徳星君禄星天佑星君夀星老人星君流年運限照臨星君紫㣲垣内列曜星君太㣲垣内列矅星君天巿垣内列曜星君六十甲子江淮河漢星君禮足各長跪皈命懴悔臣法衆䓁志心皈身皈神皈命玄穹上聖列宿星君本命元辰照臨真宰恭望大慈洞埀巨澤普䧏洪恩臣聞煌煌列聖朝拱北極之尊燦燦七星黙運中天之化有求必應無禱不從以今懴悔某自從無始以至有生𢦙身口意之相違廣营三業𢦙貪嗔癡之未所放縱六情殺盗邪滛言妄語𢦙躶露三光之下𢦙觸突衆聖之前損害衆生抛擲五榖十𢙣障重三毒業深任性所為不知慚愧𢦙見聞而自作𢦙想念以教他種種罪根一一懴悔伏願星真洞鍳斗極垂慈元綱流汗漫之恩法雨沛汪洋之澤矜憐愚昧原宥愆尤斡運限以和平順星辰扵躔度承斯懴力仰荷玄功嘉與群生咸歸正道志一心稽首禮謝無上至真三寳伏聞彼蒼者天運一元而彰衆矅至玄者道鍚五福以惠群生臣等向来拜禮寳懴巳在云周伏願諸天洞鍳廣施普博之恩列矅高臨大賜慈悲之澤千愆萬過咸乞蕩除三業六根悉蒙原赦福資萬有恩被十方稽首皈依無極天道志心稱念消愆㓕罪天尊中天紫㣲星真寳懴
