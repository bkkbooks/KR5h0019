front:
  text: 中天紫㣲星真寳懴隷九伏以乾坤大徳廣覆載於羣生日月光明普照臨於萬彚凡伸懇禱仰冀鍳觀臣謹運真香䖍誠奏啓供養虚皇大道三境至尊中天星主北極紫㣲大帝斗父龍漢祖刼周御國王天尊斗毋摩利支天大聖高上玉皇尊帝星君北極玄卿大帝日宫太陽帝君月府太隂皇君五方五徳星君四炁四曜星君天罡大聖星君三台華盖星君二十八宿星君十二宫辰星君當生本命星君上清福禄夀三老星君流年運限照臨星君三垣内外星君周天列曜河漢星君三界十方千真萬聖恭望洪慈鍳今懴悔臣聞太極生兩儀而垂象黙運化鈞髙穹布列宿以昭明分輝大地周天三百六十五四分之餘度㣲数萬一千五百二十之𨼆名見遲流伏逆於星𨇠循經緯周旋於分野恭惟星主紫㣲大帝玉陛森嚴瑶天高邈權與迼化掌握樞機端居總理扵三天綂治運行扵九道七政四炁施正令扵春夏秋冬五斗衆星鎮方維扵乾坤𩀌坎本命元辰朗曜福禄夀老光明罡星環指扵太空宿曜照臨扵大地不言善應有感必通天無𥝠親常親輔扵有徳人所禀命盖命属扵上穹臣等皈依㳟修寳懴望皇靈而稽首仰斗極以傾心以今奉爲某自從無始乃至有生縱一念以𡨋行六根纒結恣三業而罔覺十惡積増若不懴陳曷叨恩宥是以列欵上陳皈命朝禮仰望紫㣲至聖璇璣列真介景福以均霑䧏慈光而普照蕩除三業清浄六根俾五福以茂隆冀千祥而駢集臣等瞻天望聖激切屏營之至志心朝禮人各恭敬
